<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GarimpoApp — Encontre Clientes</title>
  <style>
    :root {
      --ouro:        #f5a523;
      --ouro-dark:   #c8870a;
      --ouro-glow:   rgba(245,165,35,0.35);
      --ouro-borda:  rgba(245,165,35,0.3);
      --verde:       #22c55e;
      --vermelho:    #ef4444;
      --bg:          #060d1c;
      --bg-card:     rgba(255,255,255,0.04);
      --bg-card2:    rgba(255,255,255,0.07);
      --borda:       rgba(255,255,255,0.1);
      --texto:       #ffffff;
      --texto-muted: rgba(255,255,255,0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ══════════════════════════════════════
       TELA DE AUTH
    ══════════════════════════════════════ */
    #tela-auth {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(245,165,35,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(245,165,35,0.08) 0%, transparent 50%),
        var(--bg);
    }

    .auth-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--ouro-borda);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(245,165,35,0.1), 0 20px 60px rgba(0,0,0,0.5);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 12px var(--ouro));
    }

    .auth-logo h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .auth-logo h1 span.g { color: var(--texto); }
    .auth-logo h1 span.a { color: var(--ouro); }

    .auth-logo p {
      color: var(--texto-muted);
      font-size: 0.88rem;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--borda);
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--texto-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }

    .auth-tab.ativo {
      color: var(--ouro);
      border-color: var(--ouro);
    }

    /* Form controls */
    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--texto-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select,
    select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--borda);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--texto);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input::placeholder { color: var(--texto-muted); }

    .form-group input:focus,
    .form-group select:focus,
    select:focus {
      border-color: var(--ouro);
      box-shadow: 0 0 0 3px var(--ouro-glow);
    }

    select option { background: #0d1b30; color: #fff; }

    /* Botões */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--ouro), var(--ouro-dark));
      color: #000;
      width: 100%;
      box-shadow: 0 4px 20px var(--ouro-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245,165,35,0.5);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      transform: none;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-card2);
      color: var(--texto);
      border: 1px solid var(--borda);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.12); }

    .btn-verde {
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      box-shadow: 0 4px 14px rgba(22,163,74,0.3);
    }

    .btn-verde:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-sm { padding: 8px 14px; font-size: 0.82rem; }

    /* Mensagens */
    .msg-erro {
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 12px;
    }

    .msg-ok {
      background: rgba(34,197,94,0.12);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 12px;
    }

    /* ══════════════════════════════════════
       LOADING
    ══════════════════════════════════════ */
    #tela-loading {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      background: var(--bg);
    }

    #tela-loading .logo-loading {
      font-size: 2.2rem;
      font-weight: 900;
    }

    #tela-loading .logo-loading span { color: var(--ouro); }

    #tela-loading p { color: var(--texto-muted); font-size: 0.9rem; }

    /* ══════════════════════════════════════
       APP PRINCIPAL
    ══════════════════════════════════════ */
    #app {
      display: none;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 0% 0%, rgba(245,165,35,0.06) 0%, transparent 50%),
        var(--bg);
    }

    /* Navbar */
    nav {
      background: rgba(6,13,28,0.9);
      border-bottom: 1px solid var(--ouro-borda);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 62px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      box-shadow: 0 2px 20px rgba(245,165,35,0.08);
    }

    .nav-logo {
      font-size: 1.35rem;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-logo span.g { color: #fff; }
    .nav-logo span.a { color: var(--ouro); }
    .nav-logo .icon { margin-right: 4px; filter: drop-shadow(0 0 6px var(--ouro)); }

    .nav-info { display: flex; align-items: center; gap: 14px; }

    .plano-badge {
      background: linear-gradient(135deg, var(--ouro), var(--ouro-dark));
      color: #000;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .buscas-badge {
      font-size: 0.82rem;
      color: var(--texto-muted);
    }

    /* Tabs */
    .main-tabs {
      background: rgba(6,13,28,0.7);
      border-bottom: 1px solid var(--borda);
      padding: 0 24px;
      display: flex;
      gap: 4px;
    }

    .main-tab {
      padding: 14px 20px;
      cursor: pointer;
      font-weight: 600;
      color: var(--texto-muted);
      border-bottom: 2px solid transparent;
      font-size: 0.92rem;
      transition: all 0.2s;
      margin-bottom: -1px;
    }

    .main-tab.ativo { color: var(--ouro); border-color: var(--ouro); }
    .main-tab:hover:not(.ativo) { color: var(--texto); }

    /* Container */
    .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--borda);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--ouro-borda); }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--texto);
    }

    /* Busca grid */
    .busca-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    /* Resultados */
    #lista-resultados { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

    .lead-card {
      background: var(--bg-card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: all 0.2s;
    }

    .lead-card:hover {
      border-color: var(--ouro-borda);
      box-shadow: 0 0 20px rgba(245,165,35,0.08);
    }

    .lead-card.salvo { opacity: 0.5; }

    .lead-info h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--texto);
    }

    .lead-info p {
      font-size: 0.82rem;
      color: var(--texto-muted);
      margin-bottom: 2px;
    }

    .lead-rating { font-size: 0.8rem; color: var(--ouro); font-weight: 600; }

    .lead-acoes { display: flex; gap: 8px; flex-shrink: 0; }

    /* WhatsApp btn */
    .btn-wa {
      background: linear-gradient(135deg, #25d366, #128c4e);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 2px 10px rgba(37,211,102,0.25);
    }

    /* Loader */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px;
      color: var(--texto-muted);
    }

    .spinner {
      width: 22px; height: 22px;
      border: 3px solid rgba(245,165,35,0.2);
      border-top-color: var(--ouro);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--texto-muted);
    }

    .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }

    /* Filtros */
    .leads-filtros { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

    .filtro-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--borda);
      font-size: 0.8rem;
         font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--texto-muted);
      transition: all 0.2s;
    }

    .filtro-chip:hover { border-color: var(--ouro-borda); color: var(--texto); }

    .filtro-chip.ativo {
      background: linear-gradient(135deg, var(--ouro), var(--ouro-dark));
      color: #000;
      border-color: transparent;
    }

    .acoes-topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    /* Divider */
    .auth-divider {
      text-align: center;
      color: var(--texto-muted);
      font-size: 0.78rem;
      margin: 8px 0;
    }

    /* Responsivo */
    @media (max-width: 600px) {
      .busca-grid { grid-template-columns: 1fr; }
      .nav-info .buscas-badge { display: none; }
      .lead-card { flex-direction: column; align-items: flex-start; }
      .auth-card { margin: 16px; padding: 28px 24px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     TELA DE LOGIN / CADASTRO
══════════════════════════════════════ -->
<div id="tela-auth">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">⛏️</span>
      <h1>
        <span class="g">GARIMPO</span><span class="a">APP</span>
      </h1>
      <p>ENCONTRE LEADS EM TODO O BRASIL</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab ativo" onclick="mudarAba('login')">Entrar</div>
      <div class="auth-tab" onclick="mudarAba('cadastro')">Criar conta</div>
    </div>

    <!-- Login -->
    <div id="form-login">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
      <div id="login-msg"></div>
    </div>

    <!-- Cadastro -->
    <div id="form-cadastro" style="display:none">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="cad-nome" placeholder="Seu nome completo" />
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="cad-email" placeholder="seu@email.com" />
      </div>
      <div class="form-group">
        <label>Senha (mín. 6 caracteres)</label>
        <input type="password" id="cad-senha" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="fazerCadastro()">Criar conta grátis</button>
      <div id="cad-msg"></div>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="tela-loading" style="display:none">
  <div class="logo-loading">⛏️ GARIMPO<span>APP</span></div>
  <div class="spinner" style="width:36px;height:36px;border-width:4px"></div>
  <p>Entrando na sua conta…</p>
</div>

<!-- ══════════════════════════════════════
     APP PRINCIPAL
══════════════════════════════════════ -->
<div id="app" style="display:none">
  <nav>
    <a class="nav-logo" href="#">
      <span class="icon">⛏️</span><span class="g">GARIMPO</span><span class="a">APP</span>
    </a>
    <div class="nav-info">
      <span class="buscas-badge" id="nav-buscas">— buscas restantes</span>
      <span class="plano-badge" id="nav-plano">free</span>
      <button class="btn btn-secondary btn-sm" onclick="sair()">Sair</button>
    </div>
  </nav>

  <div class="main-tabs">
    <div class="main-tab ativo" onclick="mudarTab('buscar')">🔍 Garimpar</div>
    <div class="main-tab" onclick="mudarTab('leads')">📋 Meus Leads</div>
  </div>

  <!-- Tab: Garimpar -->
  <div id="tab-buscar" class="container">
    <div class="card">
      <h2>🔍 Buscar negócios</h2>
      <div class="busca-grid">
        <div class="form-group" style="margin:0">
          <label>Nicho</label>
          <select id="sel-nicho">
            <option value="clinicas">Clínicas de Estética</option>
            <option value="odonto">Odontológicas</option>
            <option value="petshops">Pet Shops</option>
            <option value="advocacia">Advocacia</option>
            <option value="academias">Academias</option>
            <option value="contabilidade">Contabilidades</option>
            <option value="imobiliarias">Imobiliárias</option>
            <option value="restaurantes">Restaurantes</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label>Estado</label>
          <select id="sel-estado" onchange="preencherEstado()">
            <option value="">Selecione</option>
            <option value="AC">AC – Acre</option>

            <option value="BA">BA – Bahia</option>
            <option value="CE">CE – Ceará</option>
            <option value="DF">DF – Distrito Federal</option>
            <option value="ES">ES – Espírito Santo</option>
            <option value="GO">GO – Goiás</option>
            <option value="MA">MA – Maranhão</option>
            <option value="MT">MT – Mato Grosso</option>
            <option value="MS">MS – Mato Grosso do Sul</option>
            <option value="MG">MG – Minas Gerais</option>
            <option value="PA">PA – Pará</option>
            <option value="PB">PB – Paraíba</option>
            <option value="PR">PR – Paraná</option>
            <option value="PE">PE – Pernambuco</option>
            <option value="PI">PI – Piauí</option>
            <option value="RJ">RJ – Rio de Janeiro</option>
            <option value="RN">RN – Rio Grande do Norte</option>
            <option value="RS">RS – Rio Grande do Sul</option>
            <option value="RO">RO – Rondônia</option>
            <option value="RR">RR – Roraima</option>
            <option value="SC">SC – Santa Catarina</option>
            <option value="SP">SP – São Paulo</option>
            <option value="SE">SE – Sergipe</option>
            <option value="TO">TO – Tocantins</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label>Cidade</label>
          <input type="text" id="inp-cidade" placeholder="Ex: São Paulo" oninput="ajustarCidade()" />
        </div>
        <button class="btn btn-primary" onclick="fazerBusca()" id="btn-buscar">Buscar</button>
      </div>
    </div>

    <div id="busca-status"></div>
    <div id="lista-resultados"></div>
  </div>

  <!-- Tab: Leads -->
  <div id="tab-leads" class="container" style="display:none">
    <div class="card">
      <div class="acoes-topo">
        <h2>📋 Leads Salvos</h2>
        <button class="btn btn-verde btn-sm" onclick="exportarCSV()">⬇ Exportar CSV</button>
      </div>

      <div class="leads-filtros" id="filtros-nicho">
        <div class="filtro-chip ativo" onclick="filtrarLeads(null, this)">Todos</div>
        <div class="filtro-chip" onclick="filtrarLeads('clinicas', this)">Estética</div>
        <div class="filtro-chip" onclick="filtrarLeads('odonto', this)">Odonto</div>
        <div class="filtro-chip" onclick="filtrarLeads('petshops', this)">Pet</div>
        <div class="filtro-chip" onclick="filtrarLeads('advocacia', this)">Advocacia</div>
        <div class="filtro-chip" onclick="filtrarLeads('academias', this)">Academia</div>
        <div class="filtro-chip" onclick="filtrarLeads('contabilidade', this)">Contabilidade</div>
        <div class="filtro-chip" onclick="filtrarLeads('imobiliarias', this)">Imob.</div>
        <div class="filtro-chip" onclick="filtrarLeads('restaurantes', this)">Restaurante</div>
      </div>
    </div>

    <div id="lista-leads"></div>
  </div>
</div>

<script>
  // ══════════════════════════════════════════════════════════════
  // CONFIG
  // ══════════════════════════════════════════════════════════════
  const API_URL      = 'https://garimpoapp-backend-production.up.railway.app';
  const SUPABASE_URL = 'https://pupnynccxtdvqkoflhzc.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_2QU5GcePpzI2D30q_T7FyQ_Bp-Eee7F';

  let tokenJWT = localStorage.getItem('garimpo_token') || null;
  let perfilUsuario = null;
  let leadsCache = [];
  let nichoFiltro = null;

  // ── Auth ────────────────────────────────────────────────────
  async function supabaseAuth(endpoint, body) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify(body),
    });
    return res.json();
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const msgEl = document.getElementById('login-msg');
    msgEl.innerHTML = '';

    if (!email || !senha) {
      msgEl.innerHTML = '<div class="msg-erro">Preencha e-mail e senha.</div>';
      return;
    }

    msgEl.innerHTML = '<div class="loader"><div class="spinner"></div> Entrando…</div>';

    const data = await supabaseAuth('token?grant_type=password', { email, password: senha });
    if (data.access_token) {
      tokenJWT = data.access_token;
      localStorage.setItem('garimpo_token', tokenJWT);
      await iniciarApp();
    } else {
      msgEl.innerHTML = `<div class="msg-erro">❌ ${data.error_description || 'E-mail ou senha incorretos.'}</div>`;
    }
  }

  async function fazerCadastro() {
    const nome  = document.getElementById('cad-nome').value.trim();
    const email = document.getElementById('cad-email').value.trim();
    const senha = document.getElementById('cad-senha').value;
    const msgEl = document.getElementById('cad-msg');
    msgEl.innerHTML = '';

    if (!nome || !email || !senha) {
      msgEl.innerHTML = '<div class="msg-erro">Preencha todos os campos.</div>';
      return;
    }

    msgEl.innerHTML = '<div class="loader"><div class="spinner"></div> Criando conta…</div>';

    const data = await supabaseAuth('signup', { email, password: senha, data: { nome } });

    if (data.access_token) {
      tokenJWT = data.access_token;
      localStorage.setItem('garimpo_token', tokenJWT);
      await iniciarApp();
    } else if (data.id) {
      msgEl.innerHTML = '<div class="msg-ok">✅ Conta criada! Verifique seu e-mail para confirmar.</div>';
    } else {
      msgEl.innerHTML = `<div class="msg-erro">❌ ${data.error_description || 'Erro ao criar conta.'}</div>`;
    }
  }

  function sair() {
    localStorage.removeItem('garimpo_token');
    tokenJWT = null;
    perfilUsuario = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('tela-auth').style.display = 'flex';
  }

  function mudarAba(aba) {
    document.getElementById('form-login').style.display    = aba === 'login'    ? '' : 'none';
    document.getElementById('form-cadastro').style.display = aba === 'cadastro' ? '' : 'none';
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('ativo', (i === 0 && aba === 'login') || (i === 1 && aba === 'cadastro'));
    });
  }

  // ── App ─────────────────────────────────────────────────────
  async function iniciarApp() {
    document.getElementById('tela-auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    try {
      const res = await fetch(`${API_URL}/perfil`, {
        headers: { 'Authorization': `Bearer ${tokenJWT}` },
      });

      if (!res.ok) { sair(); return; }

      perfilUsuario = await res.json();
      document.getElementById('nav-plano').textContent = (perfilUsuario.plano || 'free').toUpperCase();
      document.getElementById('nav-buscas').textContent =
        `${perfilUsuario.buscas_restantes} busca${perfilUsuario.buscas_restantes !== 1 ? 's' : ''} restante${perfilUsuario.buscas_restantes !== 1 ? 's' : ''}`;
    } catch (e) {
      console.error('Erro ao carregar perfil', e);
      sair();
    }
  }

  // ── Tabs ────────────────────────────────────────────────────
  function mudarTab(tab) {
    document.querySelectorAll('.main-tab').forEach((t, i) => {
      t.classList.toggle('ativo', (i === 0 && tab === 'buscar') || (i === 1 && tab === 'leads'));
    });
    document.getElementById('tab-buscar').style.display = tab === 'buscar' ? '' : 'none';
    document.getElementById('tab-leads').style.display  = tab === 'leads'  ? '' : 'none';
    if (tab === 'leads') carregarLeads();
  }

  // ── Busca ───────────────────────────────────────────────────
  function preencherEstado() {
    const uf = document.getElementById('sel-estado').value;
    const cidadeEl = document.getElementById('inp-cidade');
    if (!uf) return;
    let cidade = cidadeEl.value.replace(/,\s*[A-Z]{2}$/, '').trim();
    cidadeEl.value = cidade ? `${cidade}, ${uf}` : '';
    if (!cidade) cidadeEl.focus();
  }

  function ajustarCidade() {
    const uf = document.getElementById('sel-estado').value;
    if (!uf) return;
    const cidadeEl = document.getElementById('inp-cidade');
    const val = cidadeEl.value;
    if (val.endsWith(`, ${uf}`) || val === '') return;
  }

  async function fazerBusca() {
    const nicho  = document.getElementById('sel-nicho').value;
    const uf     = document.getElementById('sel-estado').value;
    let   cidade = document.getElementById('inp-cidade').value.trim();
    const status = document.getElementById('busca-status');
    const lista  = document.getElementById('lista-resultados');

    if (uf && !cidade.endsWith(`, ${uf}`)) {
      cidade = cidade.replace(/,\s*[A-Z]{2}$/, '').trim();
      if (cidade) cidade = `${cidade}, ${uf}`;
    }

    if (!cidade) {
      status.innerHTML = '<div class="msg-erro">Informe a cidade e selecione o estado.</div>';
      return;
    }

    document.getElementById('btn-buscar').disabled = true;
    status.innerHTML = '<div class="loader"><div class="spinner"></div> Buscando no Google…</div>';
    lista.innerHTML = '';

    try {
      const res = await fetch(`${API_URL}/buscar`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${tokenJWT}`,
        },
        body: JSON.stringify({ nicho, cidade }),
      });

      const data = await res.json();

      if (!res.ok) {
        status.innerHTML = `<div class="msg-erro">❌ ${data.erro}</div>`;
        return;
      }

      document.getElementById('nav-buscas').textContent =
        `${data.buscas_restantes} busca${data.buscas_restantes !== 1 ? 's' : ''} restante${data.buscas_restantes !== 1 ? 's' : ''}`;

      status.innerHTML = `<div class="msg-ok">✅ ${data.total} resultado${data.total !== 1 ? 's' : ''} encontrado${data.total !== 1 ? 's' : ''} em <strong>${cidade}</strong></div>`;

      if (data.total === 0) {
        lista.innerHTML = '<div class="empty-state"><span class="emoji">🔭</span>Nenhum resultado. Tente outra cidade ou nicho.</div>';
        return;
      }

      lista.innerHTML = data.resultados.map((l, i) => renderLeadBusca(l, i)).join('');
    } catch (e) {
      status.innerHTML = '<div class="msg-erro">❌ Erro de conexão com o servidor.</div>';
    } finally {
      document.getElementById('btn-buscar').disabled = false;
    }
  }

  function renderLeadBusca(lead, idx) {
    const wa = lead.whatsapp
      ? `<a class="btn-wa" href="https://wa.me/${lead.whatsapp}" target="_blank">💬 WhatsApp</a>`
      : '';
    const estrelas = lead.rating ? `⭐ ${lead.rating}` : '';

    return `
      <div class="lead-card" id="lead-busca-${idx}">
        <div class="lead-info">
          <h3>${lead.nome}</h3>
          <p>📍 ${lead.endereco || lead.cidade}</p>
          ${lead.telefone ? `<p>📞 ${lead.telefone}</p>` : ''}
          ${estrelas ? `<p class="lead-rating">${estrelas}</p>` : ''}
        </div>
        <div class="lead-acoes">
          ${wa}
          <button class="btn btn-verde btn-sm" onclick="salvarLead(${JSON.stringify(lead).replace(/"/g, '&quot;')}, ${idx})">
            ＋ Salvar
          </button>
        </div>
      </div>
    `;
  }

  async function salvarLead(lead, idx) {
    try {
      const res = await fetch(`${API_URL}/salvar-lead`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${tokenJWT}`,
        },
        body: JSON.stringify({ lead }),
      });

      const data = await res.json();
      const card = document.getElementById(`lead-busca-${idx}`);
      if (res.ok) {
        card.classList.add('salvo');
        card.querySelector('.btn-verde').textContent = '✅ Salvo';
        card.querySelector('.btn-verde').disabled = true;
      } else {
        alert(data.erro || 'Erro ao salvar.');
      }
    } catch {
      alert('Erro de conexão.');
    }
  }

  // ── Leads salvos ────────────────────────────────────────────
  async function carregarLeads(nicho) {
    const lista = document.getElementById('lista-leads');
    lista.innerHTML = '<div class="loader"><div class="spinner"></div> Carregando leads…</div>';

    try {
      const url = nicho ? `${API_URL}/meus-leads?nicho=${nicho}` : `${API_URL}/meus-leads`;
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${tokenJWT}` } });
      const data = await res.json();
      leadsCache = data.leads || [];

      if (leadsCache.length === 0) {
        lista.innerHTML = '<div class="empty-state"><span class="emoji">📭</span>Nenhum lead salvo ainda.<br>Use a aba Garimpar para encontrar clientes.</div>';
        return;
      }

      lista.innerHTML = leadsCache.map(renderLeadSalvo).join('');
    } catch {
      lista.innerHTML = '<div class="msg-erro">Erro ao carregar leads.</div>';
    }
  }

  function renderLeadSalvo(lead) {
    const wa = lead.whatsapp
      ? `<a class="btn-wa" href="https://wa.me/${lead.whatsapp}" target="_blank">💬 WhatsApp</a>`
      : '';
    const data = new Date(lead.salvo_em).toLocaleDateString('pt-BR');
    const estrelas = lead.rating ? `⭐ ${lead.rating}` : '';

    return `
      <div class="lead-card">
        <div class="lead-info">
          <h3>${lead.nome}</h3>
          <p>📍 ${lead.endereco || lead.cidade}</p>
          ${lead.telefone ? `<p>📞 ${lead.telefone}</p>` : ''}
          ${estrelas ? `<p class="lead-rating">${estrelas}</p>` : ''}
        </div>
        <div class="lead-acoes">
          ${wa}
        </div>
      </div>
    `;
  }

  // ── Export CSV ─────────────────────────────────────────────────────
  function exportarCSV() {
    if (!leadsCache.length) { alert('Nenhum lead para exportar.'); return; }
    const header = ['Nome','Endereço','Telefone','WhatsApp','Rating','Nicho','Salvo em'].join(',');
    const rows = leadsCache.map(l => [
      l.nome, l.endereco||l.cidade, l.telefone||'', l.whatsapp||'',
      l.rating||'', l.nicho||'', l.salvo_em||''
    ].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','));
    const csv = [header, ...rows].join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'leads_garimpoapp.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function filtrarLeads(nicho, el) {
    document.querySelectorAll('.filtro-chip').forEach(c => c.classList.remove('ativo'));
    el.classList.add('ativo');
    nichoFiltro = nicho;
    carregarLeads(nicho);
  }

  // ── Init ──────────────────────────────────────────────────────────
  (function() {
    if (tokenJWT) {
      document.getElementById('tela-auth').style.display = 'none';
      document.getElementById('tela-loading').style.display = 'flex';
      fetch(API_URL + '/perfil', { headers: { 'Authorization': 'Bearer ' + tokenJWT } })
        .then(function(r) {
          if (!r.ok) throw new Error('token inválido');
          return r.json();
        })
        .then(function(perfil) {
          perfilUsuario = perfil;
          document.getElementById('tela-loading').style.display = 'none';
          document.getElementById('nav-plano').textContent = (perfil.plano || 'free').toUpperCase();
          document.getElementById('nav-buscas').textContent =
            perfil.buscas_restantes + ' busca' + (perfil.buscas_restantes !== 1 ? 's' : '') +
            ' restante' + (perfil.buscas_restantes !== 1 ? 's' : '');
          document.getElementById('app').style.display = 'block';
        })
        .catch(function() { sair(); });
    }
  })();
</script>
</body>
